bundle:
  name: lakehouse-trading-pipeline

variables:
  catalog_name:
    description: Unity Catalog used for all medallion layers.
    default: workspace
  env:
    description: Environment label written to workspace.audit.pipeline_metrics.
    default: dev

resources:
  jobs:
    medallion_pipeline:
      name: lakehouse-trading-pipeline-${var.env}
      max_concurrent_runs: 1
      tasks:
        - task_key: run_pipeline
          notebook_task:
            notebook_path: ./notebooks/04_job_runner.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              env: ${var.env}
              run_date: ""
      schedule:
        quartz_cron_expression: "0 0 7 * * ?"
        timezone_id: UTC
        pause_status: PAUSED

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-ca5e5d9b-f369.cloud.databricks.com
